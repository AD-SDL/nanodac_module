# Example node settings for the nanodac module.
# MADSci discovers this file via walk-up from the working directory.
# Precedence: CLI args > env vars > node.settings.yaml > settings.yaml
node_name: nanodac
node_url: http://0.0.0.0:2010

# nanodac device connection (Modbus/TCP)
nanodac_ip: 10.54.109.53  # APS 9-BM nanodac controller (Modbus/TCP)
nanodac_port: 502
unit_id: 1
loop: 1
