repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-ast
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: mixed-line-ending
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: https://github.com/kynan/nbstripout
    rev: 0.9.1
    hooks:
      - id: nbstripout
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.15.14
    hooks:
      # Run the linter.
      - id: ruff
        args: [--fix]
        exclude: '\.ipynb$' # Exclude Jupyter Notebooks from linting.
      # Run the formatter.
      - id: ruff-format
  - repo: https://github.com/jag-k/pydantic-settings-export
    rev: v1.0.3
    hooks:
      - id: pydantic-settings-export
        entry: pdm run pydantic-settings-export
        language: system
        files: ^src/nanodac_rest_node\.py$
        exclude: '\.ipynb$' # Exclude Jupyter Notebooks from all hooks.
